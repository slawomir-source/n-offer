<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>NBI Fibre Broadband Promotion</title>

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-S6C0ZMVVBR"></script>

<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}

gtag('js', new Date());
gtag('config', 'G-S6C0ZMVVBR');

const referralLink = "https://rewards.nbi.ie/?rafid=6147520C3A";

function isLinkedIn() {
  return navigator.userAgent.includes("LinkedInApp");
}

window.onload = function(){

  if(isLinkedIn()){

    document.getElementById("qrBlock").style.display="block";

    gtag('event','linkedin_qr_display');

  } else {

    gtag('event','browser_redirect');

    setTimeout(function(){
      window.location.href = referralLink;
    },300);

  }

}
</script>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:#f5f7fa;

padding:40px;
}

.container{

}

h1{

}

margin-top:25px;

}

.small{

}

</style>

</head>

<body>

<div class="container" id="qrBlock" style="display:none;">
